<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFill AI</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <span class="logo-icon">🤖</span>
        <h1>AutoFill AI</h1>
      </div>
      <div id="connection-status" class="status-badge disconnected">
        <span class="status-dot"></span>
        <span class="status-text">Checking...</span>
      </div>
    </header>

    <div class="tab-switcher">
      <button class="tab-btn active" data-tab="resume-tab">Resume</button>
      <button class="tab-btn" data-tab="manual-tab">Profile</button>
      <button class="tab-btn" data-tab="settings-tab">Settings</button>
    </div>

    <main>
      <!-- Resume Tab -->
      <div id="resume-tab" class="tab-content active">
        <div class="upload-section card">
          <h3>📄 Resume Upload</h3>
          <p>Agent learns from your PDF</p>
          <label class="file-btn">
            <span>Choose PDF File</span>
            <input type="file" id="resume-upload" accept=".pdf" hidden>
          </label>
          <div id="upload-status" class="mini-status"></div>
        </div>
      </div>

      <!-- Manual Profile Tab -->
      <div id="manual-tab" class="tab-content">
        <div class="manual-section card">
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="p-name" placeholder="Gaurav Meena">
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>Email</label>
              <input type="email" id="p-email" placeholder="gaurav@example.com">
            </div>
            <div class="input-group">
              <label>Phone</label>
              <input type="tel" id="p-phone" placeholder="9876543210">
            </div>
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>College</label>
              <input type="text" id="p-college" placeholder="IIT Delhi">
            </div>
            <div class="input-group">
              <label>Year</label>
              <input type="text" id="p-year" placeholder="4th Year">
            </div>
          </div>
          <div class="input-group">
            <label>Skills</label>
            <input type="text" id="p-skills" placeholder="React, Node.js, AI, Python">
          </div>
          <div class="input-group">
            <label>Experience Summary</label>
            <textarea id="p-exp" rows="3" placeholder="Summary of your work..."></textarea>
          </div>
          <button id="save-manual-btn" class="secondary-btn">Save Profile</button>
          <div id="save-status" class="mini-status"></div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div id="settings-tab" class="tab-content">
        <div class="settings-section card">
          <h3>⚙️ Production Settings</h3>
          <div class="input-group">
            <label>Backend URL</label>
            <input type="text" id="api-url" placeholder="https://your-app.onrender.com" value="http://localhost:3000">
            <small>Default is localhost:3000 for development.</small>
          </div>
          <button id="save-settings-btn" class="secondary-btn">Save Settings</button>
        </div>
      </div>

      <div class="action-section">
        <button id="fill-btn" class="primary-btn" disabled>
          <span class="btn-text">Fill This Form</span>
          <div class="loader-dots" hidden>
            <span></span><span></span><span></span>
          </div>
        </button>
      </div>

      <div id="progress-area" hidden>
        <div class="progress-step" id="step-detect">
          <div class="step-icon">1</div>
          <div class="step-label">Detecting fields</div>
          <div class="step-result"></div>
        </div>
        <div class="progress-step" id="step-match">
          <div class="step-icon">2</div>
          <div class="step-label">Matching data</div>
          <div class="step-result"></div>
        </div>
        <div class="progress-step" id="step-fill">
          <div class="step-icon">3</div>
          <div class="step-label">Filling form</div>
          <div class="step-result"></div>
        </div>
      </div>

      <div id="summary-area" class="card" hidden>
        <h4>Filling Summary</h4>
        <div id="fields-list" class="fields-grid"></div>
      </div>
    </main>

    <footer>
      <p>Built with ❤️ by Gaurav Meena</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
